<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benni Currency Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <main class="page">
        <section class="panel">
            <h1>Benni Currency Rates</h1>
            <p class="subtitle">First 5 rows from currency_rates</p>

            <div class="actions">
                <button id="refreshBtn" type="button">Refresh</button>
                <span id="status" class="status">Idle</span>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Currency</th>
                            <th>Rate</th>
                            <th>Scraped At</th>
                        </tr>
                    </thead>
                    <tbody id="rowsBody"></tbody>
                </table>
            </div>

            <section class="chart-section" aria-labelledby="chartTitle">
                <h2 id="chartTitle">EUR / USD Last 4 Months</h2>
                <p class="subtitle">Table and line plot built from /currency-rates/last-four-months endpoint</p>
                <div class="chart-meta">
                    <div class="legend">
                        <span class="legend-item">
                            <span class="legend-dot eur"></span>
                            EUR
                        </span>
                        <span class="legend-item">
                            <span class="legend-dot usd"></span>
                            USD
                        </span>
                    </div>
                    <span id="chartStatus" class="status">Chart idle</span>
                </div>
                <div class="chart-wrap">
                    <table aria-label="EUR and USD rates over the last 4 months">
                        <thead>
                            <tr>
                                <th>Currency</th>
                                <th>Rate</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="historyRowsBody"></tbody>
                    </table>
                </div>
                <div class="plot-wrap">
                    <svg id="currencyChart" viewBox="0 0 900 340" role="img"
                        aria-label="EUR and USD rates over the last 4 months"></svg>
                </div>
            </section>
        </section>
    </main>

    <script src="/app.js"></script>
</body>

</html>
